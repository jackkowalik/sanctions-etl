services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: sanctions
      MYSQL_USER: sanctions
      MYSQL_PASSWORD: sanctions
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
